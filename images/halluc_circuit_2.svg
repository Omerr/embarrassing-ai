<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="hc-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
    <marker id="hc-inh" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 9 L 10 9" stroke="#f59e0b" stroke-width="3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="640" rx="16" fill="url(#hc-bg)"/>
  <text x="600" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">Inside the Cursor bot: answer, or admit it can't?</text>

  
  <rect x="390" y="86" width="420" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="600" y="122" text-anchor="middle" font-size="21" fill="#ffffff">"How do I change the theme?"</text>
  <line x1="600" y1="142" x2="600" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#hc-arr)"/>

  
  <rect x="330" y="186" width="540" height="84" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="600" y="216" text-anchor="middle" font-size="14" letter-spacing="1" fill="rgba(255,255,255,0.35)">DEFAULT CIRCUIT · SUPPRESSED</text>
  <text x="600" y="248" text-anchor="middle" font-size="23" font-weight="700" fill="rgba(255,255,255,0.32)" text-decoration="line-through">"I can't answer"</text>

  
  <line x1="600" y1="320" x2="600" y2="280" stroke="#f59e0b" stroke-width="3" marker-end="url(#hc-inh)"/>
  <text x="636" y="304" font-size="15" font-style="italic" fill="#fcd34d">suppresses</text>

  
  <rect x="330" y="320" width="540" height="84" rx="14" fill="rgba(245,158,11,0.16)" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="600" y="350" text-anchor="middle" font-size="14" letter-spacing="1" fill="#fcd34d">"DO I KNOW THIS?" FEATURE · FIRES</text>
  <text x="600" y="382" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">recognizes it - and knows the answer</text>

  <line x1="600" y1="404" x2="600" y2="442" stroke="#94a3b8" stroke-width="2" marker-end="url(#hc-arr)"/>

  
  <rect x="300" y="448" width="600" height="80" rx="16" fill="rgba(34,197,94,0.14)" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="496" text-anchor="middle" font-size="23" fill="#ffffff">"Settings → Theme."  <tspan fill="#86efac" font-weight="700">✓</tspan></text>

  
  <text x="600" y="592" text-anchor="middle" font-size="20" fill="#fde68a">A familiar request fires the feature and <tspan font-weight="700">suppresses</tspan> the refusal → it answers.</text>
</svg>
