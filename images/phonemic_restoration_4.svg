<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="pr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="600" rx="16" fill="url(#pr-bg)"/>
  <text x="600" y="96" text-anchor="middle" font-size="42" font-weight="700" fill="#ffffff">Your brain just did what every model does</text>

  
  <text x="210" y="210" text-anchor="middle" font-size="28" font-weight="600" fill="#fde68a">Ambiguous input</text>
  <text x="210" y="244" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.55)">the crowd's chant</text>
  <g transform="translate(65,285)">
    <rect x="0" y="0" width="290" height="235" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <g fill="#94a3b8">
      <rect x="24" y="97" width="10" height="40" rx="3"/>
      <rect x="39" y="72" width="10" height="90" rx="3"/>
      <rect x="54" y="42" width="10" height="150" rx="3"/>
      <rect x="69" y="82" width="10" height="70" rx="3"/>
      <rect x="84" y="17" width="10" height="200" rx="3"/>
      <rect x="99" y="62" width="10" height="110" rx="3"/>
      <rect x="114" y="91" width="10" height="52" rx="3"/>
      <rect x="129" y="42" width="10" height="150" rx="3"/>
      <rect x="144" y="12" width="10" height="210" rx="3"/>
      <rect x="159" y="67" width="10" height="100" rx="3"/>
      <rect x="174" y="88" width="10" height="58" rx="3"/>
      <rect x="189" y="30" width="10" height="175" rx="3"/>
      <rect x="204" y="52" width="10" height="130" rx="3"/>
      <rect x="219" y="85" width="10" height="64" rx="3"/>
      <rect x="234" y="17" width="10" height="200" rx="3"/>
      <rect x="249" y="71" width="10" height="92" rx="3"/>
      <rect x="264" y="47" width="10" height="140" rx="3"/>
      <rect x="279" y="94" width="10" height="46" rx="3"/>
    </g>
  </g>

  
  <line x1="365" y1="402" x2="448" y2="402" stroke="#f59e0b" stroke-width="4" marker-end="url(#pr-arr)"/>

  
  <g transform="translate(455,330)">
    <rect x="0" y="0" width="290" height="145" rx="14" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="145" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#fcd34d">Fill the gap</text>
    <text x="145" y="95" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.8)">top-down prediction</text>
    <text x="145" y="123" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.8)">= next-token guess</text>
  </g>

  
  <line x1="755" y1="402" x2="812" y2="402" stroke="#f59e0b" stroke-width="4" marker-end="url(#pr-arr)"/>

  
  <text x="1000" y="210" text-anchor="middle" font-size="28" font-weight="600" fill="#fde68a">Confident output</text>
  <text x="1000" y="244" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.55)">committed, never flagged as a guess</text>
  <g transform="translate(820,308)">
    
    <rect x="0" y="0" width="360" height="88" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <text x="24" y="55" font-size="23" font-weight="700" fill="#0f172a">"Bart Simpson Bouncing"</text>
    <text x="338" y="55" text-anchor="end" font-size="26" fill="#16a34a">✓</text>
    
    <rect x="0" y="110" width="360" height="78" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="24" y="156" font-size="22" fill="rgba(255,255,255,0.5)">"That is embarrassing"</text>
  </g>
</svg>
