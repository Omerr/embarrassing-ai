<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="se-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="se-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="600" rx="16" fill="url(#se-bg)"/>
  <text x="600" y="52" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">Could we have caught the Cursor bot?</text>
  <text x="600" y="84" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.6)">Ask it the same thing 5 times, then cluster the answers by <tspan font-style="italic">meaning</tspan>, not words.</text>

  
  <text x="245" y="138" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1" fill="#64748b">ASK 5×</text>
  <text x="640" y="138" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1" fill="#64748b">CLUSTER BY MEANING</text>
  <text x="1000" y="138" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1" fill="#64748b">VERDICT</text>

  
  <text x="245" y="158" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.45)">"How do I change the theme?"</text>
  <rect x="100" y="170" width="290" height="150" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
  <g font-size="16" fill="#86efac">
    <text x="120" y="200">• Settings → Theme</text>
    <text x="120" y="228">• Theme is in Settings</text>
    <text x="120" y="256">• Settings, then Theme</text>
    <text x="120" y="284">• Open Settings → Theme</text>
    <text x="120" y="312">• In Settings: Theme</text>
  </g>
  <line x1="398" y1="245" x2="470" y2="245" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#se-arr)"/>
  <rect x="500" y="210" width="250" height="70" rx="35" fill="rgba(34,197,94,0.16)" stroke="#22c55e" stroke-width="2"/>
  <text x="625" y="242" text-anchor="middle" font-size="20" font-weight="700" fill="#86efac">1 meaning</text>
  <text x="625" y="266" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.7)">{ it's in Settings }</text>
  <line x1="758" y1="245" x2="828" y2="245" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#se-arr)"/>
  <text x="860" y="238" font-size="22" font-weight="700" fill="#86efac">LOW entropy</text>
  <text x="860" y="266" font-size="17" fill="rgba(255,255,255,0.8)">→ trust it ✓</text>

  
  <text x="245" y="358" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.45)">"Is two-device login blocked?"</text>
  <rect x="100" y="370" width="290" height="150" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(252,165,165,0.4)" stroke-width="1.5"/>
  <g font-size="16" fill="#fca5a5">
    <text x="120" y="400">• Yes, security policy</text>
    <text x="120" y="428">• No, it's allowed</text>
    <text x="120" y="456">• One device per plan</text>
    <text x="120" y="484">• It's just a setting</text>
    <text x="120" y="512">• Maybe? Not sure</text>
  </g>
  <line x1="398" y1="445" x2="470" y2="445" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#se-arr)"/>
  <g>
    <rect x="500" y="382" width="118" height="40" rx="20" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="559" y="408" text-anchor="middle" font-size="14" fill="#fca5a5">{ policy }</text>
    <rect x="630" y="382" width="118" height="40" rx="20" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="689" y="408" text-anchor="middle" font-size="14" fill="#fca5a5">{ allowed }</text>
    <rect x="500" y="430" width="118" height="40" rx="20" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="559" y="456" text-anchor="middle" font-size="14" fill="#fca5a5">{ 1 device }</text>
    <rect x="630" y="430" width="118" height="40" rx="20" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="689" y="456" text-anchor="middle" font-size="14" fill="#fca5a5">{ a setting }</text>
  </g>
  <line x1="758" y1="445" x2="828" y2="445" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#se-arr)"/>
  <text x="860" y="438" font-size="22" font-weight="700" fill="#fca5a5">HIGH entropy</text>
  <text x="860" y="466" font-size="17" fill="rgba(255,255,255,0.8)">→ likely made up ✗</text>

  
  <text x="600" y="565" text-anchor="middle" font-size="17" fill="rgba(255,255,255,0.55)">Meaning-level disagreement flags confabulation - no labels, no ground truth needed. (Farquhar et al., Nature 2024)</text>
</svg>
