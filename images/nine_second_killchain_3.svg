<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="kc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0808"/>
      <stop offset="1" stop-color="#3a0f0f"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="540" rx="16" fill="url(#kc-bg)"/>
  <text x="600" y="50" text-anchor="middle" font-size="29" font-weight="700" fill="#ffffff">From command to total data loss: 9 seconds</text>
  <text x="600" y="78" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.6)">PocketOS · Claude Opus 4.6 in Cursor · no human in the loop</text>
  <line x1="90" y1="250" x2="1110" y2="250" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <text x="90" y="300" text-anchor="middle" font-size="18" font-weight="700" fill="#fca5a5">0s</text>

  
  <circle cx="160" cy="250" r="16" fill="#7a1d1d" stroke="#ef4444" stroke-width="2.5"/>
  <text x="160" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
  <text x="160" y="150" text-anchor="middle" font-size="15" fill="#ffffff">Staging credential</text>
  <text x="160" y="170" text-anchor="middle" font-size="15" fill="#ffffff">mismatch</text>
  <line x1="160" y1="180" x2="160" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  
  <circle cx="350" cy="250" r="16" fill="#7a1d1d" stroke="#ef4444" stroke-width="2.5"/>
  <text x="350" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
  <text x="350" y="330" text-anchor="middle" font-size="15" fill="#ffffff">Decides on its own:</text>
  <text x="350" y="350" text-anchor="middle" font-size="15" font-weight="700" fill="#fca5a5">"delete the volume"</text>
  <text x="350" y="374" text-anchor="middle" font-size="13" font-style="italic" fill="rgba(252,165,165,0.85)">guessed staging-only</text>
  <line x1="350" y1="268" x2="350" y2="312" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  
  <circle cx="540" cy="250" r="16" fill="#7a1d1d" stroke="#ef4444" stroke-width="2.5"/>
  <text x="540" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
  <text x="540" y="150" text-anchor="middle" font-size="15" fill="#ffffff">Hunts unrelated files</text>
  <text x="540" y="170" text-anchor="middle" font-size="15" fill="#ffffff">for an API token</text>
  <line x1="540" y1="180" x2="540" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
</svg>
