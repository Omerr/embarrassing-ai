<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="fx-glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="rgba(245,158,11,0.12)"/><stop offset="1" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="640" rx="16" fill="url(#fx-bg)"/>
  <rect x="0" y="0" width="1200" height="640" rx="16" fill="url(#fx-glow)"/>

  <text x="600" y="70" text-anchor="middle" font-size="40" font-weight="800" fill="#ffffff">Give it back its <tspan fill="#fde68a">"I can't tell."</tspan></text>
  <text x="600" y="108" text-anchor="middle" font-size="19" fill="rgba(255,255,255,0.66)">Every failure tonight was the same missing reflex. Build it back, three ways.</text>
  <line x1="520" y1="128" x2="680" y2="128" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>

  
  <rect x="60" y="164" width="340" height="380" rx="16" fill="rgba(255,255,255,0.045)" stroke="rgba(96,165,250,0.45)" stroke-width="1.5"/>
  <circle cx="104" cy="224" r="24" fill="#60a5fa"/>
  <text x="104" y="232" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">1</text>
  <text x="144" y="232" font-size="15" font-weight="700" letter-spacing="1" fill="#93c5fd">WHEN IT DOESN'T KNOW</text>
  <line x1="86" y1="268" x2="374" y2="268" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="88" y="322" font-size="20" fill="rgba(255,255,255,0.92)"><tspan font-weight="700">Ground</tspan> answers in</text>
  <text x="88" y="356" font-size="20" fill="rgba(255,255,255,0.92)">sources you can show.</text>
  <text x="88" y="408" font-size="20" fill="rgba(255,255,255,0.92)">Let it say</text>
  <text x="88" y="442" font-size="20" fill="#fde68a">"I don't know."</text>
  <text x="88" y="494" font-size="17" fill="rgba(255,255,255,0.55)">Then stress-test that</text>
  <text x="88" y="520" font-size="17" fill="rgba(255,255,255,0.55)">it actually will.</text>

  
  <rect x="430" y="164" width="340" height="380" rx="16" fill="rgba(255,255,255,0.045)" stroke="rgba(251,191,36,0.45)" stroke-width="1.5"/>
  <circle cx="474" cy="224" r="24" fill="#fbbf24"/>
  <text x="474" y="232" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">2</text>
  <text x="514" y="232" font-size="15" font-weight="700" letter-spacing="1" fill="#fcd34d">WHEN IT WRITES</text>
  <line x1="456" y1="268" x2="744" y2="268" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="458" y="322" font-size="20" fill="rgba(255,255,255,0.92)">If a name goes on it</text>
  <text x="458" y="356" font-size="20" fill="rgba(255,255,255,0.92)">(lawyers, that's you),</text>
  <text x="458" y="408" font-size="20" fill="rgba(255,255,255,0.92)">a <tspan font-weight="700">human reads it.</tspan></text>
  <text x="458" y="450" font-size="20" fill="#fde68a">Every time.</text>
</svg>
