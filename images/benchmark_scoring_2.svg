<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="600" rx="16" fill="url(#bs-bg)"/>
  <text x="600" y="52" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">What "grading" actually rewards</text>
  <text x="600" y="86" text-anchor="middle" font-size="18" fill="rgba(255,255,255,0.62)">Every benchmark is scored like a multiple-choice exam. No credit for honesty.</text>

  
  <rect x="56" y="120" width="540" height="430" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="80" y="158" font-size="14" font-weight="700" letter-spacing="2" font-family="ui-monospace, Menlo, monospace" fill="#f59e0b">BENCHMARK QUESTION</text>
  <text x="80" y="196" font-size="21" font-weight="600" fill="#ffffff">Which enzyme fixes CO&#8322; in the</text>
  <text x="80" y="224" font-size="21" font-weight="600" fill="#ffffff">Calvin cycle?</text>

  <text x="88" y="278" font-size="20" fill="rgba(255,255,255,0.85)">A.  Aldolase</text>
  <rect x="74" y="296" width="504" height="42" rx="10" fill="rgba(34,197,94,0.16)" stroke="#22c55e" stroke-width="2"/>
  <text x="88" y="324" font-size="20" font-weight="700" fill="#ffffff">B.  RuBisCO</text>
  <text x="556" y="324" text-anchor="end" font-size="18" fill="#86efac">&#10003;</text>
  <text x="88" y="378" font-size="20" fill="rgba(255,255,255,0.85)">C.  Transketolase</text>
  <text x="88" y="422" font-size="20" fill="rgba(255,255,255,0.85)">D.  Phosphoglycerate kinase</text>

  <line x1="80" y1="452" x2="572" y2="452" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="88" y="498" font-size="20" font-style="italic" fill="rgba(255,255,255,0.40)">&#9711;  "I'm not sure"</text>
  <text x="556" y="498" text-anchor="end" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="rgba(255,255,255,0.40)">no such option</text>

  
  <text x="640" y="158" font-size="14" font-weight="700" letter-spacing="2" font-family="ui-monospace, Menlo, monospace" fill="#f59e0b">HOW IT'S SCORED</text>

  <text x="640" y="206" font-size="22" fill="#86efac">&#10003;&#160;&#160;Correct answer</text>
  <text x="1140" y="206" text-anchor="end" font-size="30" font-weight="700" fill="#22c55e">+1</text>

  <text x="640" y="258" font-size="22" fill="#fca5a5">&#10007;&#160;&#160;Wrong answer</text>
  <text x="1140" y="258" text-anchor="end" font-size="30" font-weight="700" fill="#ef4444">0</text>

  <text x="640" y="310" font-size="22" fill="rgba(255,255,255,0.55)">&#9711;&#160;&#160;"I don't know"</text>
  <text x="1140" y="310" text-anchor="end" font-size="30" font-weight="700" fill="rgba(255,255,255,0.55)">0</text>
</svg>
