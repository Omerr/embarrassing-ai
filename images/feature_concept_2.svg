<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="560" rx="16" fill="url(#fc-bg)"/>
  <text x="600" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff">…and how we know it's real: we can steer it</text>
  <text x="600" y="86" text-anchor="middle" font-size="17" fill="rgba(255,255,255,0.6)">Read it where it fires - then clamp it and watch the behavior change on cue.</text>

  
  <rect x="60" y="116" width="510" height="300" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
  <text x="92" y="158" font-size="15" font-weight="700" letter-spacing="1.5" fill="#86efac">READ: WHERE IT FIRES</text>
  <text x="92" y="200" font-size="16" fill="rgba(255,255,255,0.85)">fog rolled over the </text>
  <rect x="300" y="186" width="200" height="22" rx="4" fill="#34d399"/>
  <text x="306" y="202" font-size="14" fill="#0f172a">Golden Gate Bridge</text>
  <text x="92" y="248" font-size="16" fill="rgba(255,255,255,0.85)">drove across the </text>
  <rect x="262" y="234" width="70" height="22" rx="4" fill="#34d399"/>
  <text x="268" y="250" font-size="14" fill="#0f172a">bridge</text>
  <text x="338" y="248" font-size="16" fill="rgba(255,255,255,0.85)"> at dawn</text>
  <text x="92" y="296" font-size="16" fill="rgba(255,255,255,0.85)">San Francisco's </text>
  <rect x="252" y="282" width="150" height="22" rx="4" fill="#86efac"/>
  <text x="258" y="298" font-size="14" fill="#0f172a">orange towers</text>
  <rect x="92" y="344" width="430" height="42" rx="21" fill="rgba(245,158,11,0.16)" stroke="#f59e0b" stroke-width="1.3"/>
  <circle cx="118" cy="365" r="6" fill="#22c55e"/>
  <text x="134" y="370" font-size="16" font-weight="700" fill="#fcd34d">concept: "Golden Gate Bridge"</text>

  
  <rect x="630" y="116" width="510" height="300" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
  <text x="662" y="158" font-size="15" font-weight="700" letter-spacing="1.5" fill="#fcd34d">STEER: TURN IT UP</text>
  <text x="662" y="200" font-size="15" fill="rgba(255,255,255,0.7)">Golden Gate concept</text>
  <rect x="662" y="212" width="446" height="16" rx="8" fill="rgba(255,255,255,0.12)"/>
  <rect x="662" y="212" width="430" height="16" rx="8" fill="#f59e0b"/>
  <text x="1108" y="225" text-anchor="end" font-size="13" fill="#fde68a">MAX</text>
  <rect x="662" y="256" width="446" height="120" rx="12" fill="rgba(37,99,235,0.16)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="682" y="286" font-size="14" fill="rgba(255,255,255,0.6)">You: How do I bake bread?</text>
  <text x="682" y="318" font-size="15" fill="#ffffff">Model: As a majestic bridge spanning</text>
  <text x="682" y="340" font-size="15" fill="#ffffff">the bay, I'd fold the fog into the dough…</text>

  <rect x="60" y="438" width="1080" height="74" rx="12" fill="rgba(245,158,11,0.10)"/>
  <text x="600" y="471" text-anchor="middle" font-size="18" fill="#ffffff">Anthropic clamped this one to the max:</text>
  <text x="600" y="498" text-anchor="middle" font-size="18" font-weight="700" fill="#fde68a">"Golden Gate Claude" worked the bridge into every answer - proof the concept is a real lever.</text>
</svg>
